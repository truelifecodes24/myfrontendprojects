<!DOCTYPE html>
<html>
<head>
    <title>Product Details Table</title>
</head>
<body>

    <h2>Product Details Table</h2>

    <table border="1">

        <!-- Table Heading -->
        <tr>
            <th>Product Image</th>
            <th>Product Name</th>
            <th>Category</th>
            <th>Stock Status</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>

        <!-- Product Row 1 -->
        <tr>
            <td>
                <img src="../assets/images/laptop.jpg" alt="Laptop" width="100" height="80">
            </td>
            <td>Laptop</td>
            <td>Electronics</td>
            <td>In Stock</td>
            <td>15</td>
            <td>₹55,000</td>
        </tr>

        <!-- Product Row 2 -->
        <tr>
            <td>
                <img src="../assets/images/smartphone.jpg" alt="Mobile Phone" width="100" height="80">
            </td>
            <td>Smartphone</td>
            <td>Electronics</td>
            <td>In Stock</td>
            <td>30</td>
            <td>₹25,000</td>
        </tr>

        <!-- Product Row 3 -->
        <tr>
            <td>
                <img src="../assets/images/headphone.jpg" alt="Headphones" width="100" height="80">
            </td>
            <td>Headphones</td>
            <td>Accessories</td>
            <td>Out of Stock</td>
            <td>0</td>
            <td>₹2,500</td>
        </tr>

        <!-- Product Row 4 -->
        <tr>
            <td>
                <img src="../assets/images/smartwatch.jpg" alt="Smart Watch" width="100" height="80">
            </td>
            <td>Smart Watch</td>
            <td>Wearables</td>
            <td>In Stock</td>
            <td>12</td>
            <td>₹6,000</td>
        </tr>

    </table>

</body>
</html>
