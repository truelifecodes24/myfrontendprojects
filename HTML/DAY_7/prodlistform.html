<html>
<head>
    <title>Products List</title>
</head>
<body>
    <section>
        <form action="#" method="post">
            <h3>Product Enrollment Form</h3>
            <div>
                <label for="name">Product Name</label><br>
                <input type="text" id="name" name="name" required placeholder="Enter Product name">
            </div>
 <div>
                <label for="category">Product Category</label><br>
                <select id="category" name="category">
                    <option value="">Select Category</option>
                    <option value="grocery">Grocery</option>
                    <option value="vegetables">Vegetables</option>
                    <option value="fruits">Fruits </option>
                    <option value="frozen food">Frozen Food</option>
                    <option value="drinks">Drinks </option>
                    <option value="snacks">Snacks</option>
                    <option value="dairy">Dairy Products </option>
                </select>
            </div>

                <div>
                <label for="price">Product Price</label><br>
                <input type="number" id="price" name="price" min="1" required>
            </div>

              <div>
                  <label for="quantity">Product Quantity</label><br>
                <input type="number" id="quantity" name="quantity" min="1" required>
              </div>
             
              <div>
                <label for="city">Product City</label><br>
                <input type="text" id="city" name="city" required>
            </div>

            <div>
                <label for="ship id">Product Ship Id</label><br>
                <input type="number" id="ship id" name="ship id" required placeholder="Enter Product Ship Id">
            </div>

             <div>
                <label for="weight">Product Weight</label><br>
                <input type="number" id="weight" name="weight" required placeholder="Enter Product Weight in KG">
            </div>
                
            <div>
                <label>Does the Product have a license?</label><br>
                <input type="radio" id="yes" name="licence" value="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="license" value="no">
                <label for="no">No</label>
            </div>
    
            </section>
            </body>
            </html>
