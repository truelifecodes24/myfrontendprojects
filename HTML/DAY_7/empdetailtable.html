<!DOCTYPE html>
<html>
<head>
    <title>Employee Details Table</title>
</head>
<body>

    <h2>Employee Details Table</h2>

    <table border="1">

        <!-- Table Heading -->
        <tr>
            <th rowspan="2">Employee ID</th>
            <th rowspan="2">Employee Name</th>
            <th colspan="2">Department Details</th>
            <th rowspan="2">Salary</th>
        </tr>

        <tr>
            <th>Department</th>
            <th>Location</th>
        </tr>

        <!-- Employee Row 1 -->
        <tr>
            <td>101</td>
            <td>Arun Kumar</td>
            <td>HR</td>
            <td>Chennai</td>
            <td>45000</td>
        </tr>

        <!-- Employee Row 2 -->
        <tr>
            <td>102</td>
            <td>Priya Sharma</td>
            <td>Finance</td>
            <td>Bangalore</td>
            <td>55000</td>
        </tr>

        <!-- Employee Row 3 -->
        <tr>
            <td>103</td>
            <td>Rahul Verma</td>
            <td rowspan="2">IT</td>
            <td>Hyderabad</td>
            <td>60000</td>
        </tr>

        <!-- Employee Row 4 -->
        <tr>
            <td>104</td>
            <td>Sneha Reddy</td>
            <td>Pune</td>
            <td>62000</td>
        </tr>

    </table>

</body>
</html>
