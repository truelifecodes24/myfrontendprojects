<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form>

        <!-- Text Input -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <!-- Email Input -->
        <label>Email Address:</label><br>
        <input type="email" name="email"><br><br>

        <!-- Password Input -->
        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <!-- Number Input -->
        <label>Age:</label><br>
        <input type="number" name="age"><br><br>

        <!-- Date Input -->
        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <!-- Radio Button -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <!-- Checkbox -->
        <label>Skills:</label><br>
        <input type="checkbox" name="skills" value="HTML"> HTML
        <input type="checkbox" name="skills" value="CSS"> CSS
        <input type="checkbox" name="skills" value="JavaScript"> JavaScript
        <br><br>

        <!-- Select Dropdown -->
        <label>Department:</label><br>
        <select name="department">
            <option value="">--Select Department--</option>
            <option value="CSE">Computer Science</option>
            <option value="ECE">Electronics</option>
            <option value="MECH">Mechanical</option>
            <option value="CIVIL">Civil</option>
        </select>
        <br><br>

        <!-- Textarea -->
        <label>Address:</label><br>
        <textarea name="address" rows="5" cols="30"></textarea>
        <br><br>

        <!-- File Input -->
        <label>Upload Photo:</label><br>
        <input type="file" name="photo"><br><br>

        <!-- Phone Input -->
        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <!-- URL Input -->
        <label>Portfolio Website:</label><br>
        <input type="url" name="website"><br><br>

        <!-- Range Input -->
        <label>Programming Skill Level:</label><br>
        <input type="range" name="skilllevel" min="1" max="10">
        <br><br>

        <!-- Color Input -->
        <label>Favorite Color:</label><br>
        <input type="color" name="favcolor"><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Register">

        <!-- Reset Button -->
        <input type="reset" value="Reset">

    </form>

</body>
</html>
