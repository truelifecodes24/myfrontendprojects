<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS Army Cultural Fest Enrollment</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f0f8; padding: 20px; }
        form { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 10px; border-top: 8px solid #6741d9; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #6741d9; text-align: center; }
        .field-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input[type="text"], input[type="email"], input[type="number"], input[type="tel"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        .radio-group { display: flex; gap: 15px; padding: 5px 0; }
        button { width: 100%; padding: 12px; background-color: #6741d9; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #5233ad; }
    </style>
</head>
<body>

    <form action="#" method="post">
        <h2>Purple Horizon: Cultural Fest 2026</h2>
        <p style="text-align:center;">Location: Forum Vijaya Mall, Vadapalani, Chennai, India | Enrollment for 18+ only</p>
        <hr>

        <div class="field-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>

        <div class="field-group">
            <label for="age">Age (Must be 18+)</label>
            <input type="number" id="age" name="age" min="18" required>
        </div>

        <div class="field-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="non-binary">Non-binary</option>
                <option value="prefer-not-to-say">Prefer not to say</option>
            </select>
        </div>

        <div class="field-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required placeholder="12345-67890">
        </div>

        <div class="field-group">
            <label for="alt_phone">Alternate Phone Number</label>
            <input type="tel" id="alt_phone" name="alt_phone" placeholder="Emergency contact">
        </div>

        <div class="field-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="field-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required>
        </div>

        <div class="field-group">
            <label for="country">Country</label>
            <input type="text" id="country" name="country" required>
        </div>

        <div class="field-group">
            <label>Do you have a BTS Army Membership?</label>
            <div class="radio-group">
                <label><input type="radio" name="membership" value="yes"> Yes</label>
                <label><input type="radio" name="membership" value="no"> No</label>
            </div>
        </div>

        <div class="field-group">
            <label for="army_year">What year did you join the BTS Army?</label>
            <input type="number" id="army_year" name="army_year" min="2013" max="2026" placeholder="YYYY">
        </div>

        <div class="field-group">
            <label for="skills">Your Skills (e.g., Dancing, Singing, Art)</label>
            <input type="text" id="skills" name="skills" placeholder="List your talents">
        </div>

        <div class="field-group">
            <label for="discovery">How did you first come to know about BTS?</label>
            <textarea id="discovery" name="discovery" rows="3" placeholder="Share your story..."></textarea>
        </div>

        <div class="field-group">
            <label for="event_type">Interest in Events</label>
            <select id="event_type" name="event_type">
                <option value="solo">Solo Events</option>
                <option value="group">Group Events</option>
                <option value="both">Both</option>
            </select>
        </div>

        <div class="field-group">
            <label>Preferred Participation Date (2026)</label>
            <div class="radio-group">
                <label><input type="radio" name="event_date" value="june_2"> June 2nd</label>
                <label><input type="radio" name="event_date" value="june_3"> June 3rd</label>
            </div>
        </div>

        <button type="submit">SUBMIT REGISTRATION</button>
    </form>

</body>
</html>
